<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>直井ぱんの自己紹介</title>
<style>
    body {
        margin: 0;
        font-family: "Comic Sans MS", "Hiragino Maru Gothic Pro", "Arial Rounded MT Bold", sans-serif;
        background-color: #f4fff4;
        color: #222;
        text-align: center;
    }

    header {
        background-color: #000;
        color: #fff;
        padding: 20px;
        border-bottom: 5px solid #4CAF50;
    }

    header h1 {
        margin: 0;
        font-size: 2.5em;
    }

    .container {
        padding: 20px;
    }

    .card {
        background-color: #fff;
        border-radius: 20px;
        padding: 20px;
        margin: 20px auto;
        max-width: 600px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        border: 3px solid #000;
    }

    h2 {
        color: #4CAF50;
    }

    .image-placeholder {
        width: 200px;
        height: 200px;
        margin: 0 auto 15px;
        background-color: #ddd;
        border-radius: 50%;
        border: 3px dashed #999;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
        font-size: 14px;
    }

    .food-list span {
        display: inline-block;
        background-color: #4CAF50;
        color: #fff;
        padding: 8px 12px;
        border-radius: 15px;
        margin: 5px;
    }

    footer {
        margin-top: 30px;
        padding: 15px;
        background-color: #000;
        color: #fff;
        font-size: 0.9em;
    }
</style>
</head>
<body>

<header>
    <h1>直井ぱん 🐼</h1>
    <p>中国生まれのパンダのぬいぐるみ</p>
</header>

<div class="container">

    <div class="card">
        <div class="image-placeholder">
            ここに写真を入れてね
        </div>
        <h2>自己紹介</h2>
        <p>
            はじめまして！直井ぱんです。<br>
            中国で生まれた、のんびり屋のパンダのぬいぐるみです。<br>
            笹を食べたり、ごろごろするのが大好きです♪
        </p>
    </div>

    <div class="card">
        <h2>好きな食べ物</h2>
        <div class="food-list">
            <span>笹</span>
            <span>お団子</span>
        </div>
    </div>

    <div class="card">
        <h2>出身地</h2>
        <p>中国 🇨🇳</p>
    </div>

</div>

<footer>
    © 直井ぱんのページ
</footer>

</body>
</html>
