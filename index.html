<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>直井ぱんの自己紹介</title>

  <!-- かわいいフォント -->

  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Kosugi Maru', sans-serif;
      background: linear-gradient(180deg, #f0fff4, #e8f5e9);
      color: #333;
    }

    header {
      background-color: #000;
      color: white;
      text-align: center;
      padding: 30px 20px;
      border-bottom: 8px solid #66bb6a;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    header p {
      margin-top: 10px;
      font-size: 1.1em;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    h2 {
      color: #2e7d32;
      border-left: 8px solid #66bb6a;
      padding-left: 10px;
    }

    img {
      width: 100%;
      border-radius: 15px;
      object-fit: cover;
    }

    ul {
      padding-left: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #000;
      color: white;
      border-top: 8px solid #66bb6a;
      margin-top: 40px;
    }

    .emoji {
      font-size: 1.3em;
    }
  </style>

</head>

<body>

<header>
  <h1>🐼 直井ぱんのページ 🐼</h1>
  <p>中国生まれのパンダのぬいぐるみです</p>
</header>

<div class="container">

  <div class="card">
    <h2>📸 写真</h2>
    <img src="images/panda.jpg" alt="直井ぱんの写真">
  </div>

  <div class="card">
    <h2>🌱 自己紹介</h2>
    <p>
      はじめまして！ぼくは「直井ぱん」です。<br>
      中国で生まれたパンダのぬいぐるみだよ。<br>
      のんびりするのが大好きで、あーちゃんとうっさと一緒に毎日楽しく留守番しています。
    </p>
  </div>

  <div class="card">
    <h2>🍡 好きな食べ物</h2>
    <ul>
      <li>ソフトサラダせんべい</li>
      <li>バタースカッチキャンディ</li>
    </ul>
  </div>

  <div class="card">
    <h2>🌏 出身地</h2>
    <p>中国 🇨🇳</p>
  </div>

</div>

<footer>
  <p>© 直井ぱん</p>
</footer>

</body>
</html>
